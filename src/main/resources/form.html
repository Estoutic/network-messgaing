<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Форма</title>
  <style>
    body { font-family: sans-serif; display: flex; justify-content: center; padding: 40px; background: #f4f4f4; }
    form { background: white; padding: 24px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); width: 320px; }
    h2 { margin: 0 0 20px; font-size: 1.2rem; }
    label { display: block; margin-bottom: 4px; font-size: 0.9rem; color: #333; }
    input, textarea { width: 100%; box-sizing: border-box; padding: 8px; margin-bottom: 14px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.95rem; }
    button { width: 100%; padding: 10px; background: #4a90e2; color: white; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; }
    button:hover { background: #357abd; }

    #msg { display: none; margin-top: 12px; color: green; text-align: center; }
  </style>
</head>
<body>
  <form id="myForm">
    <h2>Свяжитесь с нами</h2>

    <label for="name">Имя</label>
    <input type="text" id="name" placeholder="Иван Иванов" required>

    <label for="email">Email</label>
    <input type="email" id="email" placeholder="example@mail.ru" required>

    <label for="message">Сообщение</label>
    <textarea id="message" rows="4" placeholder="Ваше сообщение..." required></textarea>

    <button type="submit">Отправить</button>
    <p id="msg">✅ Сообщение отправлено!</p>
  </form>

  <script>
    document.getElementById('myForm').addEventListener('submit', function(e) {
      e.preventDefault();
      document.getElementById('msg').style.display = 'block';
      this.reset();
    });
  </script>
</body>
</html>
